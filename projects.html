<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>PROJECTS — SOFIYA LORIASHVILI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Babylonica&family=Beau+Rivage&family=Bitcount+Prop+Single&family=EB+Garamond:wght@400;700&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/base.css">
    <style>
        /* ──────── PROJECTS PAGE ──────── */
        .projects-page {
            padding-top: 160px;
            padding-bottom: 80px;
        }

        .page-heading.projects {
            font-family: 'EBGaramondInitials', 'EB Garamond', serif;
            font-size: 220px;
            line-height: 1;
            letter-spacing: -6px;
            color: var(--c-red);
            margin: 0 0 60px;
        }

        /* 3-column grid matching shop page margins */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: var(--c-yellow);
            padding: 0 8px;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            background: var(--c-red);
            overflow: hidden;
            color: var(--c-yellow);
        }

        .project-card .pc-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }

        .project-card .pc-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .pc-footer {
            padding: 20px 24px 28px;
            background: var(--c-red);
        }

        .pc-title {
            font-family: 'Casino', serif;
            font-size: 58px;
            line-height: 1;
            letter-spacing: -2px;
            color: var(--c-yellow);
            text-transform: uppercase;
        }

        .pc-title.f-benzin {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 50px;
        }

        .pc-title.f-bayon {
            font-family: 'Bayon', sans-serif;
            font-size: 62px;
        }

        .pc-title.f-babylonica {
            font-family: 'Babylonica', cursive;
            font-size: 72px;
            text-transform: none;
        }

        .pc-title.f-cochin {
            font-family: 'Cochin', 'Playfair Display', serif;
            font-size: 56px;
        }

        .pc-title.f-beau {
            font-family: 'Beau Rivage', cursive;
            font-size: 72px;
            text-transform: none;
        }
    </style>
</head>

                <a href="shop.html" class="nav-item">SHOP</a>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="contact.html" class="nav-item">CONTACT</a>

            <div class="page-top"></div>

                    <a href="projects/4-the-boyz.html" class="project-card" data-slug="4-the-boyz">
                        <div class="pc-image">
                            <img src="assets/2025_LORIASHVILI_KINGKONG_MYSSIA__143.jpg" alt="4 the boyz">
                        </div>
                        <div class="pc-footer">
                            <h2 class="pc-title f-benzin">4 the boyz</h2>
                        </div>
                    </a>

                    <a href="projects/only-you-and-me.html" class="project-card" data-slug="only-you-and-me">

                        </div>
                        <div class="pc-footer">
                            <h2 class="pc-title f-bayon">only you and me</h2>
                        </div>
                    </a>

                    <a href="projects/ukraine.html" class="project-card" data-slug="ukraine">
                        <div class="pc-image">
