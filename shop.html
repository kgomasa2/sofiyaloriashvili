<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>SHOP — SOFIYA LORIASHVILI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Babylonica&family=Beau+Rivage&family=Bitcount+Prop+Single&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/base.css?v=202605182100">
    <style>
        /* ──────── SHOP PAGE ──────── */
        .shop-page {
            padding-top: 0;
            padding-bottom: 80px;
            background: var(--c-green);
            display: flex;
            flex-direction: column;
        }

        .shop-heading-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
        }

        .shop-heading {
            font-family: 'Bitcount Prop Single', monospace;
            font-size: 220px;
            line-height: 1;
            letter-spacing: -8px;
            color: var(--c-yellow);
            text-transform: uppercase;
            text-align: center;
            margin: 0;
        }

        /* Grid container — 3-col layout */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: var(--c-green);
            padding: 0 10px;
        }

        /* Card */
        .shop-card {
            display: flex;
            flex-direction: column;
            background: var(--c-green);
            position: relative;
            overflow: hidden;
        }

        .shop-card .sc-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: var(--c-green);
            overflow: hidden;
            position: relative;
        }

        .shop-card .sc-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sold-out / new badges */
        .sc-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--c-red);
            color: var(--c-yellow);
            padding: 6px 12px;
            z-index: 2;
        }

        .sc-badge.sold {
            background: var(--c-yellow);
            color: var(--c-green);
        }

        .shop-card .sc-info {
            padding: 20px 22px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--c-gray);
            min-height: 200px;
        }

        .sc-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .sc-title {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.8px;
            color: var(--c-yellow);
            text-transform: uppercase;
            line-height: 0.95;
            flex: 1;
        }

        .sc-price {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.8px;
            color: var(--c-yellow);
            white-space: nowrap;
        }

        .sc-pub {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 16px;
            letter-spacing: -0.4px;
            color: var(--c-yellow);
        }

        .sc-meta {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 15px;
            letter-spacing: -0.4px;
            color: var(--c-yellow);
            line-height: 1.3;
        }

        .sc-info-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
        }

        .sc-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sc-buy {
            align-self: flex-end;
            background: var(--c-yellow);
            color: var(--c-green);
            border: none;
            padding: 12px 24px;
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 24px;
            line-height: 0.8;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            text-align: center;
            flex-shrink: 0;
        }

        .sc-buy:hover {
            background: var(--c-white);
            color: var(--c-green);
        }

        .shop-card.is-sold .sc-buy {
            background: var(--c-yellow);
            color: var(--c-green);
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>

<body class="bg-green">

    <div class="canvas-wrap">
        <div class="canvas">

            <div class="header-fixed">
                <div class="logo-block">
                    <a href="index.html"><img src="assets/Group.svg" alt="SOFIYA"></a>
                </div>
                <a href="projects.html" class="nav-item">PROJECTS</a>
                <a href="shop.html" class="nav-item">SHOP</a>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="contact.html" class="nav-item">CONTACT</a>
            </div>

            <div class="page-top"></div>

            <main class="shop-page">

                <div class="shop-heading-wrap">
                    <h1 class="shop-heading hover-blink">SHOP</h1>
                </div>

                <section class="shop-grid" id="shop-grid">
                    <!-- Cards rendered dynamically from data/shop.json -->
                </section>
            </main>

            <footer class="site-footer">
                <div class="footer-links">
                    <a href="#">instagram</a>
                    <a href="#">onlyfans</a>
                    <a href="#">e-mail</a>
                </div>
                <div class="footer-logo-container">
                    <img src="assets/logo_footer.svg" alt="SOFIYA LORIASHVILI" class="footer-logo">
                </div>
            </footer>

        </div>
    </div>

    <script src="assets/base.js?v=202605182100"></script>
    <script>
        // ── Render shop cards from JSON ──
        (function () {
            const grid = document.getElementById('shop-grid');

            fetch('data/shop.json')
                .then(r => r.json())
                .then(data => {
                    const items = data.items || [];
                    items.forEach(item => {
                        const card = document.createElement('a');
                        card.className = 'shop-card' + (item.soldOut ? ' is-sold' : '');
                        card.dataset.category = item.category || '';
                        card.href = item.url || '#';

                        let badgeHTML = '';
                        if (item.badge) {
                            badgeHTML = '<span class="sc-badge' + (item.soldOut ? ' sold' : '') + '">' + item.badge + '</span>';
                        }

                        const metaText = (item.meta || '').replace(/\n/g, '<br>');

                        card.innerHTML =
                            '<div class="sc-image">' +
                                badgeHTML +
                                '<img src="' + item.image + '" alt="' + item.title + '">' +
                            '</div>' +
                            '<div class="sc-info">' +
                                '<div class="sc-row">' +
                                    '<h3 class="sc-title">' + item.title + '</h3>' +
                                    '<div class="sc-price">' + item.price + '</div>' +
                                '</div>' +
                                '<div class="sc-info-bottom">' +
                                    '<div class="sc-details">' +
                                        '<div class="sc-pub">' + (item.publisher || '') + '</div>' +
                                        '<div class="sc-meta">' + metaText + '</div>' +
                                    '</div>' +
                                    '<span class="sc-buy">' + (item.soldOut ? 'Sold out' : 'Buy') + '</span>' +
                                '</div>' +
                            '</div>';

                        grid.appendChild(card);
                    });
                })
                .catch(err => console.error('Failed to load shop data:', err));
        })();
    </script>
</body>

</html>
