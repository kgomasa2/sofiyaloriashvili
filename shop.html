<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>SHOP — SOFIYA LORIASHVILI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Babylonica&family=Beau+Rivage&family=Bitcount+Prop+Single&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/base.css">
    <style>
        /* ──────── SHOP PAGE ──────── */
        .shop-page {
            padding-top: 120px;
            padding-bottom: 80px;
        }

        .shop-heading {
            font-family: 'Bitcount Prop Single', monospace;
            font-size: 220px;
            line-height: 1;
            letter-spacing: -8px;
            color: var(--c-red);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Marquee */
        .shop-marquee {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            font-family: 'Bitcount Prop Single', monospace;
            font-size: 90px;
            line-height: 1;
            letter-spacing: -3px;
            color: var(--c-gray);
            text-transform: uppercase;
            margin: 30px 0 60px;
        }

        .shop-marquee-track {
            display: inline-block;
            animation: marquee-x 18s linear infinite;
        }

        .shop-marquee-track span {
            display: inline-block;
            padding-right: 50px;
        }

        @keyframes marquee-x {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* Filters bar (CMS-driven, just toggleable) */
        .shop-filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 80px 50px;
        }

        .shop-filter {
            font-family: 'Benzin', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--c-red);
            background: var(--c-yellow);
            border: 2px solid var(--c-red);
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .shop-filter:hover,
        .shop-filter.is-active {
            background: var(--c-red);
            color: var(--c-yellow);
        }

        /* Grid container — fixed 3-column uniform grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: var(--c-yellow);
            padding: 0 8px;
        }

        /* Span classes ignored — all cards are the same uniform tile */
        .span-12,
        .span-8,
        .span-6,
        .span-4,
        .span-3 {
            grid-column: auto;
        }

        /* Card — flow-based, content blocks editable independently */
        .shop-card {
            display: flex;
            flex-direction: column;
            background: var(--c-gray);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .shop-card:hover {
            transform: translateY(-4px);
        }

        .shop-card .sc-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #1f3d2e;
            background-image:
                linear-gradient(0deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
            position: relative;
        }

        .shop-card .sc-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sold-out / new badges */
        .sc-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--c-red);
            color: var(--c-yellow);
            padding: 6px 12px;
            z-index: 2;
        }

        .sc-badge.sold {
            background: var(--c-gray);
            color: var(--c-red);
        }

        .shop-card .sc-info {
            padding: 20px 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--c-gray);
        }

        .sc-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .sc-title {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
            color: var(--c-red);
            text-transform: uppercase;
            line-height: 0.95;
            flex: 1;
        }

        .sc-price {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
            color: var(--c-red);
            white-space: nowrap;
        }

        .sc-pub {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 16px;
            letter-spacing: -0.4px;
            color: var(--c-red);
            opacity: 0.85;
        }

        .sc-meta {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 15px;
            letter-spacing: -0.4px;
            color: var(--c-red);
            line-height: 1.3;
            opacity: 0.85;
        }

        .sc-buy {
            align-self: flex-start;
            background: var(--c-white);
            color: var(--c-red);
            border: none;
            padding: 12px 24px;
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            margin-top: 6px;
        }

        .sc-buy:hover {
            background: var(--c-red);
            color: var(--c-yellow);
        }

        .shop-card.is-sold .sc-buy {
            background: var(--c-gray);
            color: var(--c-red);
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="canvas-wrap">
        <div class="canvas">

            <div class="header-fixed">
                <div class="logo-block">
                    <a href="index.html"><img src="assets/Group.svg" alt="SOFIYA"></a>
                </div>
                <a href="projects.html" class="nav-item">PROJECTS</a>
                <a href="shop.html" class="nav-item">SHOP</a>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="contact.html" class="nav-item">CONTACT</a>
            </div>

            <div class="page-top"></div>

            <main class="shop-page">

                <h1 class="shop-heading hover-blink">SHOP</h1>

                <div class="shop-marquee">
                    <div class="shop-marquee-track">
                        <span>BOOKS · PRINTS · ZINES · BOOKS · PRINTS · ZINES · BOOKS · PRINTS · ZINES ·&nbsp;</span>
                        <span>BOOKS · PRINTS · ZINES · BOOKS · PRINTS · ZINES · BOOKS · PRINTS · ZINES ·&nbsp;</span>
                    </div>
                </div>

                <div class="shop-filters" id="shop-filters">
                    <button class="shop-filter is-active" data-filter="all">All</button>
                    <button class="shop-filter" data-filter="books">Books</button>
                    <button class="shop-filter" data-filter="prints">Prints</button>
                    <button class="shop-filter" data-filter="zines">Zines</button>
                    <button class="shop-filter" data-filter="merch">Merch</button>
                </div>

                <section class="shop-grid" id="shop-grid">
                    <!-- Cards rendered dynamically from data/shop.json -->
                </section>
            </main>

            <footer class="site-footer">
                <div class="footer-links">
                    <a href="#">instagram</a>
                    <a href="#">onlyfans</a>
                    <a href="#">e-mail</a>
                </div>
                <div class="footer-logo-container">
                    <img src="assets/logo_footer.svg" alt="SOFIYA LORIASHVILI" class="footer-logo">
                </div>
            </footer>

        </div>
    </div>

    <script src="assets/base.js"></script>
    <script>
        // ── Render shop cards from JSON ──
        (function () {
            const grid = document.getElementById('shop-grid');

            fetch('data/shop.json')
                .then(r => r.json())
                .then(data => {
                    const items = data.items || [];
                    items.forEach(item => {
                        const card = document.createElement('a');
                        card.className = 'shop-card ' + (item.span || 'span-6') + (item.soldOut ? ' is-sold' : '');
                        card.dataset.category = item.category || '';
                        card.href = item.url || '#';

                        let badgeHTML = '';
                        if (item.badge) {
                            badgeHTML = '<span class="sc-badge' + (item.soldOut ? ' sold' : '') + '">' + item.badge + '</span>';
                        }

                        const metaText = (item.meta || '').replace(/\n/g, '<br>');

                        card.innerHTML =
                            '<div class="sc-image">' +
                                badgeHTML +
                                '<img src="' + item.image + '" alt="' + item.title + '">' +
                            '</div>' +
                            '<div class="sc-info">' +
                                '<div class="sc-row">' +
                                    '<h3 class="sc-title">' + item.title + '</h3>' +
                                    '<div class="sc-price">' + item.price + '</div>' +
                                '</div>' +
                                '<div class="sc-pub">' + (item.publisher || '') + '</div>' +
                                '<div class="sc-meta">' + metaText + '</div>' +
                                '<span class="sc-buy">' + (item.soldOut ? 'Sold out' : 'Buy') + '</span>' +
                            '</div>';

                        grid.appendChild(card);
                    });

                    // Init filters after cards are rendered
                    initFilters();
                })
                .catch(err => console.error('Failed to load shop data:', err));

            function initFilters() {
                const filters = document.querySelectorAll('.shop-filter');
                const cards = document.querySelectorAll('.shop-card');
                filters.forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        filters.forEach(b => b.classList.remove('is-active'));
                        btn.classList.add('is-active');
                        const f = btn.dataset.filter;
                        cards.forEach(function (card) {
                            const match = f === 'all' || card.dataset.category === f;
                            card.style.display = match ? '' : 'none';
                        });
                    });
                });
            }
        })();
    </script>
</body>

</html>
