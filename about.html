<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>ABOUT — SOFIYA LORIASHVILI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Babylonica&family=Beau+Rivage&family=Bitcount+Prop+Single&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/base.css">
    <style>
        /* ──────── ABOUT PAGE ──────── */
        .about-page {
            padding-top: 100px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 10px;
            padding-right: 10px;
        }

        /* Intro plate: portrait + bio (blue plate, red text) */
        .about-intro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            padding: 60px 60px;
            align-items: center;
            background: var(--c-blue);
            transition: background 0.2s, color 0.2s;
        }

        .about-intro:hover {
            background: var(--c-red);
        }

        .about-intro:hover .about-bio h1,
        .about-intro:hover .about-bio p {
            color: var(--c-yellow);
        }

        .about-portrait {
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background: var(--c-yellow);
        }

        .about-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-bio h1 {
            font-family: 'Casino', serif;
            font-size: 180px;
            line-height: 0.85;
            letter-spacing: -6px;
            color: var(--c-red);
            text-transform: uppercase;
            margin-bottom: 40px;
            transition: color 0.2s;
        }

        .about-bio p {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 22px;
            line-height: 1.3;
            letter-spacing: -0.4px;
            color: var(--c-red);
            margin-bottom: 18px;
            transition: color 0.2s;
        }

        /* CV plate sections */
        .cv-section {
            padding: 60px 60px 60px;
            transition: background 0.2s, color 0.2s;
        }

        .cv-section.exhibitions-section {
            background: var(--c-yellow);
        }

        .cv-section.exhibitions-section:hover {
            background: var(--c-red);
        }

        .cv-section.exhibitions-section:hover .cv-heading,
        .cv-section.exhibitions-section:hover .cv-row {
            color: var(--c-yellow);
        }

        .cv-section.exhibitions-section:hover .cv-row {
            border-color: var(--c-yellow);
        }

        .cv-section.media-section {
            background: var(--c-green);
        }

        .cv-section.media-section .cv-heading,
        .cv-section.media-section .cv-row,
        .cv-section.media-section .cv-row .cv-link {
            color: var(--c-blue);
        }

        .cv-section.media-section .cv-row {
            border-color: var(--c-blue);
        }

        .cv-section.media-section:hover {
            background: var(--c-blue);
        }

        .cv-section.media-section:hover .cv-heading,
        .cv-section.media-section:hover .cv-row,
        .cv-section.media-section:hover .cv-row .cv-link {
            color: var(--c-green);
        }

        .cv-section.media-section:hover .cv-row {
            border-color: var(--c-green);
        }

        .cv-heading {
            text-align: center;
            margin-bottom: 60px;
            transition: color 0.2s;
        }

        .cv-heading.exhibitions {
            font-family: 'Beau Rivage', cursive;
            font-size: 220px;
            line-height: 1;
            letter-spacing: -6px;
            color: var(--c-red);
        }

        .cv-heading.media {
            font-family: 'Bangers', cursive;
            font-size: 220px;
            letter-spacing: -6px;
            color: var(--c-blue);
            text-transform: uppercase;
        }

        /* CV list — flow layout, each item is one row, easy to map from CMS */
        .cv-list {
            list-style: none;
            max-width: 1120px;
            margin: 0 auto;
            padding: 0;
        }

        .cv-row {
            display: grid;
            grid-template-columns: 140px 1fr 200px;
            gap: 32px;
            align-items: baseline;
            padding: 22px 0;
            border-top: 1px solid currentColor;
            font-family: 'ArialNarrow', sans-serif;
            font-size: 22px;
            line-height: 1.2;
            letter-spacing: -0.3px;
            color: var(--c-red);
            transition: color 0.2s, border-color 0.2s;
        }

        .cv-list .cv-row:last-child {
            border-bottom: 1px solid currentColor;
        }

        .cv-year {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .cv-title {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 22px;
            font-weight: 400;
        }

        .cv-title em {
            font-style: italic;
            font-weight: 700;
        }

        .cv-place {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 18px;
            text-align: right;
            opacity: 0.85;
        }

        .cv-row.media-row {
            grid-template-columns: 280px 1fr 60px;
        }

        .cv-row .cv-link {
            text-align: right;
            text-decoration: underline;
            font-family: 'Benzin', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
    </style>
</head>

<body>

    <div class="canvas-wrap">
        <div class="canvas">

            <div class="header-fixed">
                <div class="logo-block">
                    <a href="index.html"><img src="assets/Group.svg" alt="SOFIYA"></a>
                </div>
                <a href="projects.html" class="nav-item">PROJECTS</a>
                <a href="shop.html" class="nav-item">SHOP</a>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="contact.html" class="nav-item">CONTACT</a>
            </div>

            <div class="page-top"></div>

            <main class="about-page">

                <section class="about-intro">
                    <div class="about-portrait">
                        <img src="assets/Screenshot 2026-04-27 at 17.07.12 1.png" alt="Sofiya Loriashvili">
                    </div>
                    <div class="about-bio">
                        <h1>About</h1>
                        <div id="bio-text"><!-- loaded from JSON --></div>
                    </div>
                </section>

                <section class="cv-section exhibitions-section">
                    <h2 class="cv-heading exhibitions">Exhibitions</h2>
                    <ul class="cv-list" id="exhibitions-list">
                        <!-- loaded from JSON -->
                    </ul>
                </section>

                <section class="cv-section media-section">
                    <h2 class="cv-heading media">Media</h2>
                    <ul class="cv-list" id="media-list">
                        <!-- loaded from JSON -->
                    </ul>
                </section>
            </main>

            <footer class="site-footer">
                <div class="footer-links">
                    <a href="#">instagram</a>
                    <a href="#">onlyfans</a>
                    <a href="#">e-mail</a>
                </div>
                <div class="footer-logo-container">
                    <img src="assets/logo_footer.svg" alt="SOFIYA LORIASHVILI" class="footer-logo">
                </div>
            </footer>

        </div>
    </div>

    <script src="assets/base.js"></script>
    <script>
        // ── Render about page from JSON ──
        (function () {
            fetch('data/about.json')
                .then(r => r.json())
                .then(data => {
                    // Bio paragraphs
                    const bioEl = document.getElementById('bio-text');
                    if (bioEl && data.bio) {
                        data.bio.forEach(text => {
                            const p = document.createElement('p');
                            p.textContent = text;
                            bioEl.appendChild(p);
                        });
                    }

                    // Exhibitions
                    const exhList = document.getElementById('exhibitions-list');
                    if (exhList && data.exhibitions) {
                        data.exhibitions.forEach(ex => {
                            const li = document.createElement('li');
                            li.className = 'cv-row';
                            li.innerHTML =
                                '<span class="cv-year">' + ex.year + '</span>' +
                                '<span class="cv-title">' + ex.title + '</span>' +
                                '<span class="cv-place">' + ex.place + '</span>';
                            exhList.appendChild(li);
                        });
                    }

                    // Media
                    const mediaList = document.getElementById('media-list');
                    if (mediaList && data.media) {
                        data.media.forEach(m => {
                            const li = document.createElement('li');
                            li.className = 'cv-row media-row';
                            li.innerHTML =
                                '<span class="cv-year">' + m.outlet + '</span>' +
                                '<span class="cv-title">' + m.title + '</span>' +
                                '<a class="cv-link" href="' + (m.url || '#') + '">Read</a>';
                            mediaList.appendChild(li);
                        });
                    }
                })
                .catch(err => console.error('Failed to load about data:', err));
        })();
    </script>
</body>

</html>
