<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>ABOUT — SOFIYA LORIASHVILI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Babylonica&family=Beau+Rivage&family=Bitcount+Prop+Single&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/base.css">
    <style>
        /* ──────── ABOUT PAGE ──────── */
        .about-page {
            padding-top: 160px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 10px;
            padding-right: 10px;
        }

        /* First panel: transparent, centered About title + tagline */
        .about-intro {
            background: transparent;
            padding: 40px 80px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-grow: 1;
            min-height: 280px;
        }

        .about-title {
            font-family: 'Casino', serif;
            font-size: 180px;
            line-height: 1;
            letter-spacing: -6px;
            color: var(--c-gray);
            text-transform: uppercase;
        }

        .about-tagline {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 22px;
            letter-spacing: -0.3px;
            color: var(--c-gray);
            text-align: center;
        }

        /* Two-column CV panels */
        .cv-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .cv-section {
            padding: 50px 40px 60px;
        }

        .cv-section.exhibitions-section {
            background: var(--c-blue);
        }

        .cv-section.media-section {
            background: var(--c-green);
        }

        .cv-heading {
            text-align: center;
            margin-bottom: 40px;
        }

        .cv-heading.exhibitions {
            font-family: 'Beau Rivage', cursive;
            font-size: 160px;
            line-height: 1;
            letter-spacing: -4px;
            color: var(--c-red);
        }

        .cv-heading.media {
            font-family: 'Bangers', cursive;
            font-size: 160px;
            line-height: 1;
            letter-spacing: -4px;
            color: var(--c-red);
            text-transform: uppercase;
        }

        .cv-list {
            list-style: none;
            padding: 0;
        }

        .cv-row {
            display: grid;
            grid-template-columns: 70px 1fr 110px;
            gap: 16px;
            align-items: baseline;
            padding: 14px 0;
            font-family: 'ArialNarrow', sans-serif;
            font-size: 18px;
            line-height: 1.3;
            letter-spacing: -0.3px;
            color: var(--c-red);
        }

        .cv-row.media-row {
            grid-template-columns: 130px 1fr 50px;
        }

        .cv-year {
            font-family: 'Benzin', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0;
            white-space: nowrap;
            color: var(--c-red);
        }

        .cv-title {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--c-red);
        }

        .cv-title em {
            font-style: italic;
            font-weight: 700;
        }

        .cv-place {
            font-family: 'ArialNarrow', sans-serif;
            font-size: 15px;
            text-align: right;
            opacity: 0.8;
            color: var(--c-red);
        }

        .cv-row .cv-link {
            text-align: right;
            text-decoration: underline;
            font-family: 'Benzin', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--c-red);
        }

        /* Disable hover on ABOUT nav item */
        .header-fixed .nav-item[href="about.html"]:hover {
            color: var(--c-red);
            background: var(--c-gray);
        }
    </style>
</head>

<body>

    <div class="canvas-wrap">
        <div class="canvas">

            <div class="header-fixed">
                <div class="logo-block">
                    <a href="index.html"><img src="assets/Group.svg" alt="SOFIYA"></a>
                </div>
                <a href="projects.html" class="nav-item">PROJECTS</a>
                <a href="shop.html" class="nav-item">SHOP</a>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="contact.html" class="nav-item">CONTACT</a>
            </div>

            <div class="page-top"></div>

            <main class="about-page">

                <!-- About title + tagline -->
                <section class="about-intro">
                    <h1 class="about-title">About</h1>
                    <p class="about-tagline">Sofia Loriashvili, The Contemporary Artist</p>
                </section>

                <!-- Two-column: Exhibitions (blue) + Media (green) -->
                <div class="cv-columns">

                    <section class="cv-section exhibitions-section">
                        <h2 class="cv-heading exhibitions">Exhibitions</h2>
                        <ul class="cv-list" id="exhibitions-list"></ul>
                    </section>

                    <section class="cv-section media-section">
                        <h2 class="cv-heading media">Media</h2>
                        <ul class="cv-list" id="media-list"></ul>
                    </section>

                </div>

            </main>

            <footer class="site-footer">
                <div class="footer-links">
                    <a href="#">instagram</a>
                    <a href="#">onlyfans</a>
                    <a href="#">e-mail</a>
                </div>
                <div class="footer-logo-container">
                    <img src="assets/logo_footer.svg" alt="SOFIYA LORIASHVILI" class="footer-logo">
                </div>
            </footer>

        </div>
    </div>

    <script src="assets/base.js"></script>
    <script>
        (function () {
            fetch('data/about.json')
                .then(r => r.json())
                .then(data => {
                    // Exhibitions
                    const exhList = document.getElementById('exhibitions-list');
                    if (exhList && data.exhibitions) {
                        data.exhibitions.forEach(ex => {
                            const li = document.createElement('li');
                            li.className = 'cv-row';
                            li.innerHTML =
                                '<span class="cv-year">' + ex.year + '</span>' +
                                '<span class="cv-title">' + ex.title + '</span>' +
                                '<span class="cv-place">' + ex.place + '</span>';
                            exhList.appendChild(li);
                        });
                    }

                    // Media
                    const mediaList = document.getElementById('media-list');
                    if (mediaList && data.media) {
                        data.media.forEach(m => {
                            const li = document.createElement('li');
                            li.className = 'cv-row media-row';
                            li.innerHTML =
                                '<span class="cv-year">' + m.outlet + '</span>' +
                                '<span class="cv-title">' + m.title + '</span>' +
                                '<a class="cv-link" href="' + (m.url || '#') + '">Read</a>';
                            mediaList.appendChild(li);
                        });
                    }
                })
                .catch(err => console.error('Failed to load about data:', err));
        })();
    </script>
</body>

</html>
