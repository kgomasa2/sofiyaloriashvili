<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title>Project — SOFIYA LORIASHVILI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Babylonica&family=Beau+Rivage&family=Bitcount+Prop+Single&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/base.css">
    <link rel="stylesheet" href="assets/detail.css">
</head>

<body>

    <div class="canvas-wrap">
        <div class="canvas">

            <div class="header-fixed">
                <div class="logo-block">
                    <a href="index.html"><img src="assets/Group.svg" alt="SOFIYA"></a>
                </div>
                <a href="projects.html" class="nav-item">PROJECTS</a>
                <a href="shop.html" class="nav-item">SHOP</a>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="contact.html" class="nav-item">CONTACT</a>
            </div>

            <div class="page-top"></div>

            <main id="project-main">
                <p style="padding:120px 64px;font-family:sans-serif;">Loading…</p>
            </main>

            <footer class="site-footer">
                <div class="footer-links">
                    <a href="#">instagram</a>
                    <a href="#">onlyfans</a>
                    <a href="#">e-mail</a>
                </div>
                <div class="footer-logo-container">
                    <img src="assets/logo_footer.svg" alt="SOFIYA LORIASHVILI" class="footer-logo">
                </div>
            </footer>

        </div>
    </div>

    <script src="assets/base.js"></script>
    <script>
        (function () {
            const main = document.getElementById('project-main');

            function escapeHtml(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function getSlug() {
                const params = new URLSearchParams(window.location.search);
                return params.get('slug');
            }

            function renderNotFound(slug) {
                main.innerHTML =
                    '<section class="proj-hero">' +
                        '<div></div>' +
                        '<div>' +
                            '<h1 class="proj-title">Not found</h1>' +
                            '<p class="proj-subtitle">No project with slug "' + escapeHtml(slug) + '". ' +
                            '<a href="projects.html">Back to all projects</a>.</p>' +
                        '</div>' +
                    '</section>';
            }

            function renderGalleryRow(row) {
                const layout = row.layout || 'full';
                const portrait = row.portrait ? ' portrait' : '';
                const imgs = (row.images || []).map(function (src) {
                    return '<div class="g-img' + portrait + '"><img src="' + escapeHtml(src) + '" alt=""></div>';
                }).join('');
                return '<div class="gallery-row ' + escapeHtml(layout) + '">' + imgs + '</div>';
            }

            function renderProject(project, prev, next) {
                document.title = (project.title || 'Project') + ' — SOFIYA LORIASHVILI';

                if (project.bg) {
                    document.body.classList.add('bg-' + project.bg);
                }

                const titleFont = project.titleFont ? ' ' + project.titleFont : '';

                const sideHTML = (project.sideMeta || [])
                    .map(function (m) {
                        return '<dt>' + escapeHtml(m.label) + '</dt><dd>' + escapeHtml(m.value) + '</dd>';
                    }).join('');

                const bodyHTML = (project.body || [])
                    .map(function (p) { return '<p>' + escapeHtml(p) + '</p>'; })
                    .join('');

                const galleryHTML = (project.gallery || []).map(renderGalleryRow).join('');

                const prevLink = prev
                    ? '<a class="nav-prev" href="project.html?slug=' + encodeURIComponent(prev.slug) + '">← ' + escapeHtml(prev.title) + '</a>'
                    : '<span class="nav-prev" style="visibility:hidden">←</span>';

                const nextLink = next
                    ? '<a class="nav-next" href="project.html?slug=' + encodeURIComponent(next.slug) + '">' + escapeHtml(next.title) + ' →</a>'
                    : '<span class="nav-next" style="visibility:hidden">→</span>';

                main.innerHTML =
                    '<section class="proj-hero">' +
                        '<div class="proj-hero-meta">' +
                            '<div class="pc-year">' + escapeHtml(project.year || '') + '</div>' +
                        '</div>' +
                        '<div>' +
                            '<h1 class="proj-title' + titleFont + '">' + escapeHtml(project.title || '') + '</h1>' +
                            '<p class="proj-subtitle">' + escapeHtml(project.subtitle || '') + '</p>' +
                        '</div>' +
                    '</section>' +
                    (project.cover
                        ? '<section class="proj-cover"><img src="' + escapeHtml(project.cover) + '" alt="' + escapeHtml(project.title || '') + ' cover"></section>'
                        : '') +
                    '<section class="proj-desc">' +
                        '<dl class="desc-side">' + sideHTML + '</dl>' +
                        '<div class="desc-body">' + bodyHTML + '</div>' +
                    '</section>' +
                    (galleryHTML ? '<section class="proj-gallery">' + galleryHTML + '</section>' : '') +
                    '<nav class="proj-nav">' +
                        prevLink +
                        '<a class="nav-back" href="projects.html">All projects</a>' +
                        nextLink +
                    '</nav>';
            }

            const slug = getSlug();
            if (!slug) {
                renderNotFound('');
                return;
            }

            fetch('data/projects.json')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    const items = (data && data.items) || [];
                    const idx = items.findIndex(function (p) { return p.slug === slug; });
                    if (idx === -1) {
                        renderNotFound(slug);
                        return;
                    }
                    const prev = idx > 0 ? items[idx - 1] : null;
                    const next = idx < items.length - 1 ? items[idx + 1] : null;
                    renderProject(items[idx], prev, next);
                })
                .catch(function (err) {
                    console.error('Failed to load projects.json:', err);
                    renderNotFound(slug);
                });
        })();
    </script>
</body>

</html>
